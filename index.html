<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      padding: 32px 24px;
      height: fit-content;
    }

    h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4361ee;
    }

    .input-row button {
      padding: 12px 20px;
      background: #4361ee;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #3a56d4; }

    .list {
      list-style: none;
    }

    .list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-bottom: 1px solid #f0f0f0;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .list li:last-child { border-bottom: none; }

    .list li.checked .item-text {
      text-decoration: line-through;
      color: #aaa;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .checkbox:hover { border-color: #4361ee; }

    .checked .checkbox {
      background: #4361ee;
      border-color: #4361ee;
    }

    .checked .checkbox::after {
      content: '✓';
      color: #fff;
      font-size: 14px;
      font-weight: 700;
    }

    .item-text {
      flex: 1;
      font-size: 15px;
      color: #333;
      transition: color 0.2s;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
      transition: color 0.2s;
      line-height: 1;
    }

    .delete-btn:hover { color: #e63946; }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 40px 0;
      font-size: 15px;
    }

    .count {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>🛒 쇼핑 리스트</h1>
    <div class="input-row">
      <input type="text" id="itemInput" placeholder="추가할 항목을 입력하세요" />
      <button id="addBtn">추가</button>
    </div>
    <ul class="list" id="list"></ul>
    <div id="empty" class="empty">리스트가 비어 있습니다</div>
    <div id="count" class="count"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://qpinilrcuuhljbgzudpa.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwaW5pbHJjdXVobGpiZ3p1ZHBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDkwOTIsImV4cCI6MjA5MDY4NTA5Mn0.UuY28L9NcX4SVRuh_nPi75nGF9r2Ckc-0-ZcWLXeiAw';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];

    const listEl = document.getElementById('list');
    const emptyEl = document.getElementById('empty');
    const countEl = document.getElementById('count');
    const input = document.getElementById('itemInput');
    const addBtn = document.getElementById('addBtn');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });
    addBtn.addEventListener('click', addItem);

    async function loadItems() {
      const { data, error } = await supabase
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });
      if (error) {
        console.error('데이터 로드 실패:', error);
        return;
      }
      items = data;
      render();
    }

    function render() {
      listEl.replaceChildren();
      emptyEl.style.display = items.length ? 'none' : 'block';

      items.forEach((item) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const checkbox = document.createElement('div');
        checkbox.className = 'checkbox';
        checkbox.addEventListener('click', () => toggle(item.id, item.checked));

        const text = document.createElement('span');
        text.className = 'item-text';
        text.textContent = item.text;

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = '×';
        deleteBtn.addEventListener('click', () => remove(item.id));

        li.append(checkbox, text, deleteBtn);
        listEl.appendChild(li);
      });

      const done = items.filter(i => i.checked).length;
      countEl.textContent = items.length
        ? `${done} / ${items.length} 완료`
        : '';
    }

    async function addItem() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      input.focus();

      const { error } = await supabase
        .from('shopping_items')
        .insert({ text, checked: false });
      if (error) {
        console.error('추가 실패:', error);
        return;
      }
      await loadItems();
    }

    async function toggle(id, currentChecked) {
      const { error } = await supabase
        .from('shopping_items')
        .update({ checked: !currentChecked })
        .eq('id', id);
      if (error) {
        console.error('업데이트 실패:', error);
        return;
      }
      await loadItems();
    }

    async function remove(id) {
      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .eq('id', id);
      if (error) {
        console.error('삭제 실패:', error);
        return;
      }
      await loadItems();
    }

    loadItems();
    input.focus();
  </script>
</body>
</html>
